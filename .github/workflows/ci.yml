name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate plugin (schema + version alignment)
        run: node scripts/validate-plugin.js
      - name: Validate content (referential integrity + placeholders + script selftests)
        run: node scripts/validate-content.js
