<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BetterCallClaudeGrowth — GTM Intelligence per Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E27"/>
      <stop offset="0.55" stop-color="#191046"/>
      <stop offset="1" stop-color="#2C1450"/>
    </linearGradient>
    <linearGradient id="accent" x1="900" y1="320" x2="1220" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="word" x1="80" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9D5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1050 200) rotate(90) scale(260)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="400" rx="20" fill="url(#glow)"/>

  <!-- subtle decorative dots grid -->
  <g fill="#FFFFFF" opacity="0.05">
    <circle cx="120" cy="60" r="2"/><circle cx="200" cy="60" r="2"/><circle cx="280" cy="60" r="2"/>
    <circle cx="120" cy="340" r="2"/><circle cx="200" cy="340" r="2"/><circle cx="280" cy="340" r="2"/>
    <circle cx="1180" cy="350" r="2"/><circle cx="1110" cy="350" r="2"/>
  </g>

  <!-- eyebrow -->
  <text x="82" y="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" letter-spacing="3" font-weight="600" fill="#A5B4FC">CLAUDE CODE PLUGIN · GO-TO-MARKET INTELLIGENCE</text>

  <!-- wordmark -->
  <text x="80" y="200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1.5">
    <tspan fill="url(#word)">BetterCallClaude</tspan><tspan fill="url(#accent)">Growth</tspan>
  </text>
  <rect x="84" y="222" width="120" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="84" y="268" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="500" fill="#CBD5E1">Dal Job-to-Be-Done alla misura: il go-to-market per <tspan fill="#F0ABFC" font-weight="700">ogni business</tspan>.</text>

  <!-- chips -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600">
    <g>
      <rect x="84" y="300" width="108" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#818CF8" stroke-opacity="0.45"/>
      <text x="138" y="322" text-anchor="middle" fill="#C7D2FE">coaching</text>
    </g>
    <g>
      <rect x="200" y="300" width="108" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#818CF8" stroke-opacity="0.45"/>
      <text x="254" y="322" text-anchor="middle" fill="#C7D2FE">B2B SaaS</text>
    </g>
    <g>
      <rect x="316" y="300" width="78" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#818CF8" stroke-opacity="0.45"/>
      <text x="355" y="322" text-anchor="middle" fill="#C7D2FE">B2C</text>
    </g>
    <g>
      <rect x="402" y="300" width="118" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#818CF8" stroke-opacity="0.45"/>
      <text x="461" y="322" text-anchor="middle" fill="#C7D2FE">e-commerce</text>
    </g>
    <g>
      <rect x="528" y="300" width="84" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#818CF8" stroke-opacity="0.45"/>
      <text x="570" y="322" text-anchor="middle" fill="#C7D2FE">local</text>
    </g>
  </g>

  <!-- growth graphic: funnel stages ascending into an arrow -->
  <g transform="translate(900 70)" filter="url(#soft)" opacity="0.35">
    <path d="M20 250 L120 175 L210 120 L300 35" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>
  <g transform="translate(900 70)">
    <!-- baseline -->
    <line x1="10" y1="262" x2="320" y2="262" stroke="#475569" stroke-opacity="0.5" stroke-width="2"/>
    <!-- ascending growth line -->
    <path d="M20 250 L120 175 L210 120 L300 35" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- arrowhead -->
    <path d="M300 35 L268 44 M300 35 L291 67" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- funnel-stage nodes -->
    <circle cx="20" cy="250" r="9" fill="#22D3EE"/>
    <circle cx="120" cy="175" r="9" fill="#818CF8"/>
    <circle cx="210" cy="120" r="9" fill="#C084FC"/>
    <circle cx="300" cy="35" r="11" fill="#E879F9"/>
    <circle cx="300" cy="35" r="20" fill="none" stroke="#E879F9" stroke-opacity="0.4" stroke-width="2"/>
  </g>

  <!-- score chip -->
  <g transform="translate(1066 300)">
    <rect width="148" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.07" stroke="#E879F9" stroke-opacity="0.5"/>
    <text x="74" y="23" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#F5D0FE">GTM Readiness 0–100</text>
  </g>
</svg>
